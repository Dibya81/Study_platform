<!DOCTYPE html>
<html>

<head>
    <script>
        const uid = localStorage.getItem("user_id");
        if (!uid || uid === "demo-user" || uid === "1") {
            localStorage.removeItem("user_id");
            window.location.href = "pages/login.html";
        }
    </script>
    <title>Consensus Engine</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/sidebar.css">

</head>

<body>

    <script>
        if (localStorage.getItem('spatialTheme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>


    <div class="container">
        <!-- Mobile Overlay -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <div class="sidebar" id="mainSidebar">

            <div class="sidebar-header">
                <img src="images/logo.png" alt="Logo" class="sidebar-logo">
                <h2>Consensus AI</h2>
                <button id="pinBtn" class="pin-btn" title="Pin / Unpin Sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="4"></circle>
                    </svg>
                </button>
            </div>

            <ul id="sidebarList">


                <li onclick="openPage('dashboard')">Project Dashboard</li>
                <li onclick="openPage('aihub')">AI Hub</li>
                <li onclick="openPage('mentor')">AI Mentor</li>
                <li onclick="openPage('codehub')">Code Hub</li>
                <li onclick="openPage('community')">Community</li>
                <li onclick="openPage('progress')">Progress</li>
                <li onclick="openPage('career')">Career</li>
                <li onclick="openPage('voice')">Voice AI</li>

            </ul>

        </div>

        <div class="workspace">
            <!-- Global Search Header -->
            <header class="top-header">
                <button id="mobileMenuBtn" class="hamburger-btn" title="Menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="search-icon"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="search-bar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="search-icon"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="globalSearch"
                        placeholder="Search Consensus API, documentation, or community...">
                </div>
                <!-- Search dropdown results -->
                <div id="searchResults" class="search-results floating-card" style="display: none;"></div>
            </header>

            <iframe id="workspaceFrame" src="pages/dashboard.html"></iframe>

        </div>

    </div>

    <!-- 11/10 Global Spatial Effects -->
    <div id="cursorMist" class="cursor-mist"></div>

    <script src="js/main.js"></script>

</body>

</html>
