<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Consensus Engine - Login</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .login-card {
            background-color: var(--bg-surface);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .login-card h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 600;
        }

        .login-card p {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-size: 14px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-surface-elevated);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .login-button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-blue);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .login-button:hover {
            opacity: 0.9;
        }

        .login-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #errorMessage {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>

<body>

    <script>
        if (localStorage.getItem('spatialTheme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>


    <div class="login-card">
        <h2>AI Consensus Engine</h2>
        <p>Trusted AI Learning Workspace</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="nameInput">Enter your name</label>
                <input type="text" id="nameInput" placeholder="e.g. Dibya" required autocomplete="off">
            </div>

            <button type="submit" id="loginBtn" class="login-button">Start Learning</button>
            <div id="errorMessage"></div>
        </form>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
