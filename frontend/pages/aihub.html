<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/aihub.css">
</head>

<body>

    <script>
        if (localStorage.getItem('spatialTheme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>


    <div class="aihub-layout reveal">
        <!-- Sidebar -->
        <div class="aihub-sidebar glass-panel">
            <button class="new-chat-btn" onclick="startNewChat()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Consensus Chat
            </button>
            <div class="history-list" id="chatHistoryList">
                <!-- Javascript will render previously saved chats here -->
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="aihub-main">
            <div class="aihub-header">
                <h2 class="gradient-text">Consensus AI Hub</h2>
                <div class="header-badges">
                    <span class="badge agent">
                        <div class="dot l1"></div> AI 1
                    </span>
                    <span class="badge agent">
                        <div class="dot l2"></div> AI 2
                    </span>
                    <span class="badge judge">
                        <div class="dot l3"></div> Consensus Judge
                    </span>
                </div>
            </div>

            <!-- ChatGPT Style Window -->
            <div class="chat-window" id="chatWindow">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                        stroke-linecap="round" stroke-linejoin="round" style="opacity:0.5; margin-bottom: 24px;">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 17 12 22 22 17"></polyline>
                        <polyline points="2 12 12 17 22 12"></polyline>
                    </svg>
                    <h3>Welcome to the Consensus Engine Hub</h3>
                    <p>Ask a question. Three individual local AI models will process it to determine the optimal truth.
                    </p>
                </div>
            </div>

            <!-- Bottom Input Bar -->
            <div class="chat-input-area glass-panel">
                <div class="file-preview-area" id="filePreviewArea" style="display: none;">
                    <div class="file-chip">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        <span id="fileName">document.pdf</span>
                        <button class="remove-file-btn" onclick="removeFile()">✕</button>
                    </div>
                </div>
                <div class="input-wrapper">
                    <label for="hubFileUpload" class="attachment-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                            </path>
                        </svg>
                    </label>
                    <input type="file" id="hubFileUpload" style="display: none;" accept=".pdf,.ppt,.pptx,.txt,.md"
                        onchange="handleHubFileUpload(this)">

                    <textarea id="promptInput" class="glass-input" placeholder="Ask anything, or attach a file..."
                        onkeypress="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendPrompt(); }"></textarea>

                    <button class="primary send-btn" onclick="sendPrompt()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/aihub.js"></script>

</body>

</html>
