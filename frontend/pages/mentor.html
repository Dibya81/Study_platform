<!DOCTYPE html>
<html>

<head>

    <title>AI Mentor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/mentor.css">

</head>

<body>

    <script>
        if (localStorage.getItem('spatialTheme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>


    <div class="mentor-layout reveal">
        <!-- History Sidebar -->
        <div class="mentor-history glass-panel">
            <div class="history-header">
                <h3>Chat History</h3>
                <button class="icon-btn" title="New Chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">No past chats found.</div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="mentor-container">
            <h2 class="gradient-text">AI Mentor</h2>
            <div id="chatBox" class="chat-box"></div>
            <div class="input-area">
                <input id="questionInput" placeholder="Ask your question... e.g. What is binary search?"
                    onkeypress="if(event.key === 'Enter') sendQuestion()" />
                <button onclick="sendQuestion()">Ask AI</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/mentor.js"></script>

</body>

</html>
