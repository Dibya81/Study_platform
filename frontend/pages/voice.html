<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/voice.css">
</head>

<body>

    <script>
        if (localStorage.getItem('spatialTheme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>


    <div class="voice-container reveal">
        <h2 class="gradient-text">Conversational Voice Engine</h2>

        <div class="voice-workspace">

            <!-- Active Microphone Display -->
            <div class="mic-panel glass-panel">
                <div class="mic-status" id="micStatus">Engine Ready</div>

                <div class="mic-radar-container">
                    <button id="micBtn" class="mic-button" onclick="startVoice()">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="22"></line>
                        </svg>
                    </button>
                    <!-- Rings generated by CSS animation -->
                    <div class="radar-ring r1"></div>
                    <div class="radar-ring r2"></div>
                </div>

                <div class="active-transcript" id="transcript">
                    Press the button to start speaking...
                </div>
            </div>

            <!-- Voice History / Response Chat -->
            <div class="voice-chat glass-panel">
                <div class="chat-header">
                    <h3>Discussion History</h3>
                    <button class="icon-btn" onclick="clearVoiceHistory()" title="Clear History">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                            </path>
                        </svg>
                    </button>
                </div>

                <div id="voiceHistory" class="chat-feed">
                    <div class="empty-state">
                        Your conversations will appear here.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/voice.js"></script>

</body>

</html>
