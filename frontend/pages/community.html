<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/community.css">
</head>

<body>

    <script>
        if (localStorage.getItem('spatialTheme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>


    <div class="community-container reveal">
        <h2 class="gradient-text">Community Feed</h2>

        <div class="post-create glass-panel">
            <div class="post-create-header">
                <div class="avatar-placeholder">U</div>
                <input id="postUsername" class="glass-input subtle" placeholder="Your Name (Optional)"
                    value="Guest User">
            </div>
            <textarea id="postContent" class="glass-input"
                placeholder="Share your thoughts with the community..."></textarea>
            <div class="post-actions">
                <button class="primary" onclick="createPost()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    Post
                </button>
            </div>
        </div>

        <div id="feed" class="feed-container">
            <!-- Posts rendered here -->
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/community.js"></script>

</body>

</html>
